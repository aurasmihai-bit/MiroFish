services:
  - type: web
    name: mirofish-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      source $HOME/.cargo/env
      pip install uv
      uv pip install --system -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL_NAME
        sync: false
      - key: ZEP_API_KEY
        sync: false
      - key: PORT
        value: "5001"
    plan: free

  - type: web
    name: mirofish-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 3000
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    plan: free
